<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <title>Formulario de Contacto</title>
    <style>
        body {
        background-color: #f0f4f8;
        font-family: Arial, sans-serif;
        }

        .formulario {
        background-color: #1a2235;
        width: 500px;
        margin: 40px auto;
        padding: 40px;
        border-radius: 10px;
        }

        label {
        color: #8b9bb4;
        display: block;
        margin-bottom: 5px;
        }

        input, textarea {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid #8b9bb4;
        color: white;
        font-size: 16px;
        padding: 6px 0;
        margin-bottom: 25px;
        outline: none;
        }

        textarea {
        height: 80px;
        resize: none;
        }

        button {
        background-color: #6c63ff;
        color: white;
        border: none;
        padding: 14px 28px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        }

        button:hover {
        background-color: #857dff;
        }
    </style>
    </head>
    <body>

    <div class="formulario">

        <label>Nombre</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Mensaje</label>
        <textarea></textarea>

        <button>Enviar Mensaje</button>

    </div>

    </body>
</html>
