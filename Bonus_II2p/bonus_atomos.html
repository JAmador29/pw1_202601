<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atom Loader</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f1117;
      font-family: system-ui, sans-serif;
    }

    .atom {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .nucleus {
      position: absolute;
      top: 50%; left: 50%;
      width: 30px; height: 30px;
      margin: -15px 0 0 -15px;
      background: #EF9F27;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.3); opacity: 0.7; }
    }

    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      border: 2px solid;
      border-radius: 50%;
    }

    .orbit-1 {
      width: 80px; height: 80px;
      margin: -40px 0 0 -40px;
      border-color: #378ADD;
      animation: spin 1.5s linear infinite;
    }

    .orbit-2 {
      width: 130px; height: 130px;
      margin: -65px 0 0 -65px;
      border-color: #1D9E75;
      animation: spin 2.5s linear infinite reverse;
    }

    .orbit-3 {
      width: 180px; height: 180px;
      margin: -90px 0 0 -90px;
      border-color: #D4537E;
      animation: spin 3.5s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .electron {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      top: -6px;
      left: 50%;
      margin-left: -6px;
    }

    .electron-1 { background: #378ADD; }
    .electron-2 { background: #1D9E75; }
    .electron-3 { background: #D4537E; }

    .label {
      margin-top: 24px;
      font-size: 14px;
      color: #ffffff88;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ffffff88;
      animation: blink 1s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="atom">
      <div class="nucleus"></div>

      <div class="orbit orbit-1">
        <div class="electron electron-1"></div>
      </div>

      <div class="orbit orbit-2">
        <div class="electron electron-2"></div>
      </div>

      <div class="orbit orbit-3">
        <div class="electron electron-3"></div>
      </div>
    </div>

    <div class="label">
      Cargando
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

</body>
</html>
