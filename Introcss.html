<!DOCTYPE html>
<html>
    <head>
        <title> Introduccion CSS</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="Styles/intro.css">
        <script>
            document.addEventListener("DOMContentLoaded", ()=>{
                const hb = document.querySelector(".hamburguer-buttons");
                const nav = document.querySelector("header nav");
                hb.addEventListener("click", (e)=>{
                    e.preventDefault();
                    e.stopPropagation();
                    nav.classList.toggle("hidden");
                });
            });
        </script>
    </head>
    <body>
        <header>
            <div>
                <div class ="hamburguer-buttons">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
                <h1>Soccer</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#hero">Home</a></li>
                    <li><a href="#Pricing">Pricing</a></li>
                    <li><a href="#testimonials">Testimonials</a></li>
                    <li><a href="#contactus">Contact Us</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="hero" id="hero">
                <diV>
                    <picture>
                        <source srcset="https://picsum.photos/id/80/1300/720" media = "(min-width: 1025px)"/>    
                        <source srcset="https://picsum.photos/id/80/1025/640" media = "(min-width: 720px)"/>    
                        <img src = "https://picsum.photos/id/80/480/480" alt="Hero Panel Image">
                    </picture>
                </diV>
                <div class = "action-panel q2">
                    <h2>Agenda una cIta para la demo!!!</h2>
                    <a href>Agendar</a>
                </div>
            </section>
            <section class="grid">
                <div class="row">
                    <div class="col-4">Col de 4 </div>
                    <div class="col-3">Col de 3 </div>
                    <div class="col-5">Col de 5 </div>
                </div>
            </section>
        </main>
        <footer>
            <section>
                2026 all Rights Reserved &copy;
            </section>
        </footer>
    </body>
</html>
